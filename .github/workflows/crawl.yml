name: Daily crawl and report

on:
  schedule:
    # 22:00 UTC = 07:00 JST（毎日）
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: web-summary-agent-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl / discover / summarize / build report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/main.py

      - name: Commit and push updates
        run: |
          git config user.name "web-summary-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data state docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: 自動巡回結果を更新するため、レポートとstateを更新"
            git push
          fi
